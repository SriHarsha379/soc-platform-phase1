# ============================================================
# SOC Platform - SMTP Alert Configuration
# ============================================================

[smtp]
host = smtp.gmail.com
port = 587
use_tls = true
use_starttls = true
username = your-email@gmail.com
password = your-smtp-app-password
from_address = soc-alerts@yourdomain.com
from_name = SOC Platform Alerts

[recipients]
# Comma-separated list of alert recipients
default = security-team@yourdomain.com
critical = soc-manager@yourdomain.com,security-team@yourdomain.com
escalation = ciso@yourdomain.com,soc-manager@yourdomain.com

[thresholds]
cpu_critical = 85
memory_critical = 90
disk_critical = 85
failed_logins_per_minute = 5
host_down_minutes = 2

[rate_limiting]
# Maximum alerts per hour per alert type
max_per_hour = 10
cooldown_minutes = 15
