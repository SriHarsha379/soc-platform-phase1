<!-- ============================================================
     SOC Platform - Wazuh Agent Configuration Template
     Location: /var/ossec/etc/shared/default/agent.conf
     Applied to all agents in the 'default' group
     ============================================================ -->

<agent_config>

  <!-- ── Log Collection ─────────────────────────────────────── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/secure</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/messages</location>
  </localfile>

  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- ── File Integrity Monitoring ────────────────────────── -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc/passwd,/etc/shadow,/etc/group</directories>
    <directories check_all="yes">/etc,/usr/bin,/usr/sbin,/bin,/sbin</directories>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/resolv.conf</ignore>
    <ignore>/etc/adjtime</ignore>
  </syscheck>

  <!-- ── Rootcheck ─────────────────────────────────────────── -->
  <rootcheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
  </rootcheck>

  <!-- ── Active Response ───────────────────────────────────── -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

  <!-- ── Labels ────────────────────────────────────────────── -->
  <labels>
    <label key="environment">production</label>
    <label key="platform">soc-phase1</label>
  </labels>

</agent_config>
