# Zabbix Server Configuration
# https://www.zabbix.com/documentation/current/manual/appendix/config/zabbix_server

# ── Database ──────────────────────────────────────────────────────────────────
DBHost=zabbix-db
DBPort=5432
DBName=zabbix
DBUser=zabbix
# DBPassword is set via POSTGRES_PASSWORD environment variable by the container
DBSocket=

# ── General ───────────────────────────────────────────────────────────────────
ListenPort=10051
SourceIP=
LogFile=/var/log/zabbix/zabbix_server.log
LogFileSize=10
DebugLevel=3
PidFile=/run/zabbix/zabbix_server.pid

# ── Alert & Notifications ─────────────────────────────────────────────────────
AlertScriptsPath=/usr/lib/zabbix/alertscripts
ExternalScripts=/usr/lib/zabbix/externalscripts

# ── Performance Tuning ────────────────────────────────────────────────────────
StartPollers=5
StartIPMIPollers=0
StartPreprocessors=3
StartPollersUnreachable=1
StartTrappers=5
StartPingers=1
StartDiscoverers=1
StartHTTPPollers=1
StartTimers=1
StartEscalators=1
StartAlerters=3
CacheSize=32M
CacheUpdateFrequency=60
StartDBSyncers=4
HistoryCacheSize=16M
HistoryIndexCacheSize=4M
TrendCacheSize=4M
TrendFunctionCacheSize=4M
ValueCacheSize=8M
HousekeepingFrequency=1
MaxHousekeeperDelete=5000

# ── SNMP Traps ────────────────────────────────────────────────────────────────
SNMPTrapperFile=/tmp/zabbix_traps.tmp
StartSNMPTrapper=0

# ── Misc ──────────────────────────────────────────────────────────────────────
Timeout=4
UnreachablePeriod=45
UnavailableDelay=60
UnreachableDelay=15
TmpDir=/tmp
FpingLocation=/usr/bin/fping
Fping6Location=/usr/bin/fping6
LogSlowQueries=3000
