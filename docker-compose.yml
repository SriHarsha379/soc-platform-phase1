version: '3.8'

# ============================================================
# SOC Platform Phase 1 - Docker Compose
# Services: Zabbix, Wazuh, Elasticsearch, Kibana, Alerting
# ============================================================

networks:
  soc-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${SOC_NETWORK_SUBNET:-172.20.0.0/16}

volumes:
  zabbix-db-data:
  elasticsearch-data:
  wazuh-manager-data:
  wazuh-manager-logs:
  wazuh-manager-etc:
  kibana-data:

services:

  # ─────────────────────────────────────────
  # Zabbix PostgreSQL Database
  # ─────────────────────────────────────────
  zabbix-db:
    image: postgres:15-alpine
    container_name: zabbix-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabbix_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
    volumes:
      - zabbix-db-data:/var/lib/postgresql/data
    networks:
      - soc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zabbix}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # Zabbix Server
  # ─────────────────────────────────────────
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:ubuntu-6.4-latest
    container_name: zabbix-server
    restart: unless-stopped
    depends_on:
      zabbix-db:
        condition: service_healthy
    environment:
      DB_SERVER_HOST: ${ZABBIX_DB_HOST:-zabbix-db}
      DB_SERVER_PORT: ${ZABBIX_DB_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabbix_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      ZBX_STARTPOLLERS: 5
      ZBX_STARTPINGERS: 1
      ZBX_STARTTRAPPERS: 5
      ZBX_STARTDISCOVERERS: 1
      ZBX_STARTESCALATORS: 1
      ZBX_CACHESIZE: 32M
      ZBX_HISTORYCACHESIZE: 16M
      ZBX_HISTORYTEXTCACHESIZE: 16M
      ZBX_VALUECACHESIZE: 8M
      ZBX_ENABLEREMOTECOMMANDS: 1
      ZBX_LOGSLOWQUERIES: 3000
    volumes:
      - ./config/zabbix/zabbix_server.conf:/etc/zabbix/zabbix_server.conf:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "10051:10051"
    networks:
      - soc-network
    healthcheck:
      test: ["CMD", "zabbix_server", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # Zabbix Web Frontend
  # ─────────────────────────────────────────
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:ubuntu-6.4-latest
    container_name: zabbix-web
    restart: unless-stopped
    depends_on:
      - zabbix-server
      - zabbix-db
    environment:
      ZBX_SERVER_HOST: ${ZABBIX_SERVER_HOST:-zabbix-server}
      ZBX_SERVER_PORT: ${ZABBIX_SERVER_PORT:-10051}
      DB_SERVER_HOST: ${ZABBIX_DB_HOST:-zabbix-db}
      DB_SERVER_PORT: ${ZABBIX_DB_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabbix_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-zabbix}
      PHP_TZ: ${PHP_TZ:-UTC}
    ports:
      - "8080:8080"
    networks:
      - soc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # Zabbix Agent (for monitoring the SOC host)
  # ─────────────────────────────────────────
  zabbix-agent:
    image: zabbix/zabbix-agent2:ubuntu-6.4-latest
    container_name: zabbix-agent
    restart: unless-stopped
    depends_on:
      - zabbix-server
    environment:
      ZBX_SERVER_HOST: ${ZABBIX_SERVER_HOST:-zabbix-server}
      ZBX_SERVER_PORT: ${ZABBIX_SERVER_PORT:-10051}
      ZBX_HOSTNAME: soc-platform-host
      ZBX_HOSTMETADATA: soc-platform
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
    ports:
      - "10050:10050"
    networks:
      - soc-network
    privileged: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # Elasticsearch
  # ─────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.11.0}
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - node.name=es-node-1
      - cluster.name=soc-es-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms256m -Xmx256m}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic_secure_password}
      - xpack.security.authc.api_key.enabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - ./config/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - soc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD:-elastic_secure_password} http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # Kibana
  # ─────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION:-8.11.0}
    container_name: kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_SERVICEACCOUNTTOKEN: AAEAAWVsYXN0aWMva2liYW5hL2tpYmFuYV90b2tlbjozQ2ZNdUJrbFNpeUNXRHU0X1NDN0tB
    volumes:
      - kibana-data:/usr/share/kibana/data
    ports:
      - "5601:5601"
    networks:
      - soc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # Wazuh Manager
  # ─────────────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.0
    container_name: wazuh-manager
    restart: unless-stopped
    hostname: wazuh-manager
    environment:
      INDEXER_URL: https://elasticsearch:9200
      INDEXER_USERNAME: ${ELASTIC_USERNAME:-elastic}
      INDEXER_PASSWORD: ${ELASTIC_PASSWORD:-elastic_secure_password}
      FILEBEAT_SSL_VERIFICATION_MODE: none
      SSL_CERTIFICATE_AUTHORITIES: ""
      SSL_CERTIFICATE: ""
      SSL_KEY: ""
      API_USERNAME: ${WAZUH_API_USER:-wazuh-wui}
      API_PASSWORD: ${WAZUH_API_PASSWORD:-W@zuh_SecurePass123!}
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - wazuh-manager-logs:/var/ossec/logs
      - wazuh-manager-etc:/var/ossec/etc
      - ./config/wazuh/ossec.conf:/var/ossec/etc/ossec.conf:ro
      - ./config/wazuh/rules/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
      - ./config/wazuh/rules/decoders/local.xml:/var/ossec/etc/decoders/local_decoders.xml:ro
      - ./config/wazuh/agent_configs/agent.conf:/var/ossec/etc/shared/default/agent.conf:ro
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    networks:
      - soc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -k -s https://localhost:55000/ | grep -q 'Wazuh'"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # SOC Alerting Service (Python)
  # ─────────────────────────────────────────
  soc-alerting:
    build:
      context: ./alerting
      dockerfile: Dockerfile
    container_name: soc-alerting
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOST: http://elasticsearch:9200
      ELASTIC_USERNAME: ${ELASTIC_USERNAME:-elastic}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-elastic_secure_password}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-soc-alerts@yourdomain.com}
      ALERT_RECIPIENTS: ${ALERT_RECIPIENTS:-security-team@yourdomain.com}
      CPU_ALERT_THRESHOLD: ${CPU_ALERT_THRESHOLD:-85}
      MEMORY_ALERT_THRESHOLD: ${MEMORY_ALERT_THRESHOLD:-90}
      DISK_ALERT_THRESHOLD: ${DISK_ALERT_THRESHOLD:-85}
      FAILED_LOGIN_THRESHOLD: ${FAILED_LOGIN_THRESHOLD:-5}
    volumes:
      - ./config/alerting/alert_templates.json:/app/alert_templates.json:ro
    networks:
      - soc-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
