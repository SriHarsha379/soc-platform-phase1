upstream soc_backend {
    server backend:4000;
}

upstream soc_frontend {
    server frontend:80;
}

upstream soc_ai {
    server soc-ai:8000;
}

upstream soc_soar {
    server soc-soar:8001;
}

server {
    listen 80;
    server_name _;

    # ── API (Express backend) ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://soc_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── AI service (FastAPI anomaly detection) ────────────────────────────────
    location /ai/ {
        rewrite            ^/ai/(.*) /$1 break;
        proxy_pass         http://soc_ai;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SOAR service (FastAPI playbook engine) ────────────────────────────────
    location /soar/ {
        rewrite            ^/soar/(.*) /$1 break;
        proxy_pass         http://soc_soar;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── React SPA (Vite build served by frontend Nginx) ───────────────────────
    location / {
        proxy_pass         http://soc_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
