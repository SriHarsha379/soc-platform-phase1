<!--
  ossec-extended.conf - Phase 2 Extended Wazuh Manager Configuration
  SOC Platform - Data Analytics & Log Correlation Layer
  Extends Phase 1 ossec.conf with correlation and enrichment settings
-->
<ossec_config>

  <!-- ====================================================================
       Global Settings
       ==================================================================== -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>yes</email_notification>
    <smtp_server>localhost</smtp_server>
    <email_from>wazuh@soc-platform.local</email_from>
    <email_to>soc-team@soc-platform.local</email_to>
    <email_maxperhour>50</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!-- ====================================================================
       Analysis Engine
       ==================================================================== -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- ====================================================================
       Remote Connection (Wazuh Agents)
       ==================================================================== -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- ====================================================================
       Rule Ordering (Phase 2 extends Phase 1)
       ==================================================================== -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>
  </ruleset>

  <!-- ====================================================================
       Log Analysis Sources
       ==================================================================== -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <localfile>
    <log_format>command</log_format>
    <command>df -P</command>
    <frequency>360</frequency>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>netstat -tulpn | sed 's/\([[:alnum:]]\+\)\ \+[[:digit:]]\+\ \+[[:digit:]]\+\ \+\(.*\):\([[:digit:]]*\)\ \+\([0-9\.\:\*]\+\).\+\ \([[:digit:]]*\/[[:alnum:]\_\-]*\).*/\1 \2 == \3 == \4 \5/' | sort -k 4 -g | sed 's/ == \(.*\) == / \1 /'</command>
    <alias>netstat listening ports</alias>
    <frequency>360</frequency>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>last -n 20</command>
    <frequency>360</frequency>
  </localfile>

  <!-- ====================================================================
       Integrity Checking (FIM)
       ==================================================================== -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- Critical files to monitor -->
    <directories check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories check_all="yes">/bin,/sbin,/boot</directories>
    <directories check_all="yes" realtime="yes">/etc/passwd,/etc/shadow,/etc/sudoers</directories>

    <!-- Ignore noisy paths -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/etc/svc/volatile</ignore>
    <ignore type="sregex">.log$|.swp$</ignore>
  </syscheck>

  <!-- ====================================================================
       Rootkit Detection
       ==================================================================== -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
    <rootkit_files>/var/ossec/etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>/var/ossec/etc/shared/rootkit_trojans.txt</rootkit_trojans>
    <system_audit>/var/ossec/etc/shared/system_audit_rcl.txt</system_audit>
    <system_audit>/var/ossec/etc/shared/system_audit_ssh.txt</system_audit>
    <system_audit>/var/ossec/etc/shared/cis_debian_linux_rcl.txt</system_audit>
  </rootcheck>

  <!-- ====================================================================
       Vulnerability Detection (Phase 2 enhancement)
       ==================================================================== -->
  <vulnerability-detector>
    <enabled>yes</enabled>
    <interval>5m</interval>
    <ignore_time>6h</ignore_time>
    <run_on_start>yes</run_on_start>
    <provider name="canonical">
      <enabled>yes</enabled>
      <os>focal</os>
      <os>jammy</os>
      <update_interval>1h</update_interval>
    </provider>
    <provider name="nvd">
      <enabled>yes</enabled>
      <update_from_year>2010</update_from_year>
      <update_interval>1h</update_interval>
    </provider>
  </vulnerability-detector>

  <!-- ====================================================================
       Active Response (Phase 2: automated responses)
       ==================================================================== -->
  <active-response>
    <!-- Block IPs on brute-force detection -->
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>100010,100011</rules_id>
    <timeout>600</timeout>
  </active-response>

  <active-response>
    <!-- Restart service on integrity check failure -->
    <command>restart-service</command>
    <location>local</location>
    <rules_id>100020</rules_id>
    <timeout>0</timeout>
  </active-response>

  <!-- ====================================================================
       Elasticsearch Output (Phase 2)
       ==================================================================== -->
  <integration>
    <name>elasticsearch</name>
    <hook_url>http://elasticsearch:9200</hook_url>
    <format>json</format>
    <alert_format>json</alert_format>
  </integration>

  <!-- ====================================================================
       Log Collection from Agents
       ==================================================================== -->
  <cluster>
    <name>soc-cluster</name>
    <node_name>master-node</node_name>
    <node_type>master</node_type>
    <key>c98b62a9b0469c1e4fa47ebaf9e94697</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>NODE_IP</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>

  <!-- ====================================================================
       API Configuration
       ==================================================================== -->
  <api>
    <https>no</https>
    <port>55000</port>
    <behind_proxy_server>no</behind_proxy_server>
    <https_cert>/var/ossec/api/configuration/ssl/server.crt</https_cert>
    <https_key>/var/ossec/api/configuration/ssl/server.key</https_key>
    <https_use_ca>no</https_use_ca>
    <https_ca>/var/ossec/api/configuration/ssl/ca.crt</https_ca>
    <use_only_authd>false</use_only_authd>
    <drop_privileges>true</drop_privileges>
    <experimental_features>false</experimental_features>
    <secure_headers>true</secure_headers>
    <access>
      <max_login_attempts>50</max_login_attempts>
      <block_time>300</block_time>
      <max_request_per_minute>300</max_request_per_minute>
    </access>
    <logs>
      <level>info</level>
      <format>plain</format>
    </logs>
  </api>

</ossec_config>
